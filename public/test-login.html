<!DOCTYPE html>
<html>
<head>
    <title>Admin Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        input { padding: 8px; width: 100%; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>🔐 Admin Login Test</h1>
    
    <div class="test">
        <h3>Quick Test</h3>
        <input type="email" id="email" value="admin@taxease.ca" placeholder="Email">
        <input type="password" id="password" value="demo123" placeholder="Password">
        <button onclick="testLogin()">Test Login</button>
        <button onclick="testDirect()">Test Direct API</button>
        <button onclick="testProxy()">Test Proxy API</button>
        <div id="result"></div>
    </div>

    <script>
        // Enable detailed logging
        window.addEventListener('error', (e) => {
            console.error('Global error:', e);
        });

        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '<p>Testing login...</p>';
            console.log('🔐 Testing login:', { email, password: '***' });
            
            try {
                console.log('📤 Sending request to /api/v1/auth/login');
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                console.log('📥 Response received:', {
                    status: response.status,
                    statusText: response.statusText,
                    headers: Object.fromEntries(response.headers.entries())
                });
                
                const data = await response.json();
                console.log('📦 Response data:', data);
                
                if (response.ok) {
                    // Store token
                    if (data.token?.access_token) {
                        localStorage.setItem('taxease_access_token', data.token.access_token);
                        console.log('✅ Token stored');
                    }
                    
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h4>✅ Login Successful!</h4>
                            <p><strong>User:</strong> ${data.user.email}</p>
                            <p><strong>Name:</strong> ${data.user.name}</p>
                            <p><strong>Role:</strong> ${data.user.role}</p>
                            <p><strong>Active:</strong> ${data.user.is_active}</p>
                            <p><strong>Token:</strong> ${data.token.access_token.substring(0, 50)}...</p>
                            <hr>
                            <p><a href="/" style="color: blue; font-weight: bold;">Go to Dashboard →</a></p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h4>❌ Login Failed</h4>
                            <p><strong>Status:</strong> ${response.status}</p>
                            <p><strong>Error:</strong> ${data.detail || JSON.stringify(data)}</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('❌ Error:', error);
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ Network Error</h4>
                        <p>${error.message}</p>
                        <p>Check the console for more details (F12)</p>
                    </div>
                `;
            }
        }
        
        async function testDirect() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testing direct backend...</p>';
            
            try {
                const response = await fetch('http://localhost:8003/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="success">
                        <h4>✅ Direct API Works!</h4>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ Direct API Failed</h4>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        async function testProxy() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testing proxy...</p>';
            
            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="success">
                        <h4>✅ Proxy API Works!</h4>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ Proxy API Failed</h4>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
